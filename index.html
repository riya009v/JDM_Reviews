<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Review for Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <div class="review-box">
            <div class="icon-stars">⭐⭐⭐⭐⭐</div>
            <h1 class="main-title">Review for "JDM Travels"</h1>
            <p class="subtitle">Here is a suggested review for you. You can copy it and post it on our Google Maps profile!</p>
            
            <div class="review-content" id="user-review-text">
                <!-- Review text will appear here -->
            </div>

            <div class="action-buttons">
                <button class="btn-primary" id="btn-copy-post">
                    📋 Copy & Post on Google
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message" id="toast-message">Copied to clipboard!</span>
    </div>

    <script src="reviews.js"></script>
    <script src="script.js"></script>
</body>
</html>
